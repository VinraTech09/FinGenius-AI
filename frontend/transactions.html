    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Transactions</h1>
        <div class="flex gap-2">
          <button class="btn btn-success" id="addIncomeBtn">+ Add Income</button>
          <button class="btn btn-danger" id="addExpenseBtn">+ Add Expense</button>
          <button class="btn" id="downloadBtn">+ Download CSV</button>
        </div>
      </div>
      
      <!-- Filters -->
      <div class="transactions-header">
        <div class="filter-group">
          <select id="typeFilter" class="form-select" style="width: auto;">
            <option value="">All Types</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <select id="categoryFilter" class="form-select" style="width: auto;">
            <option value="">All Categories</option>
            <option value="Salary">Salary</option>
            <option value="Freelancing">Freelancing</option>
            <option value="Investment">Investment</option>
            <option value="Business">Business</option>
            <option value="Other">Other</option>
            <option value="Bills">Bills</option>
            <option value="Utilities">Utilities</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="EMI">EMI</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Education">Education</option>
          </select>
        </div>
      </div>
      
      <!-- Transactions List -->
      <div class="transaction-list" id="transactionsList">
        <div class="loading-container"><div class="spinner"></div></div>
      </div>

  <!-- Add Income Modal -->
  <div class="modal-overlay" id="incomeModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Add Income</h3>
        <button class="modal-close">&times;</button>
      </div>
      <form id="incomeForm">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="incomeCategory" class="form-select" required>
            <option value="">Select category</option>
            <option value="Salary">Salary</option>
            <option value="Freelancing">Freelancing</option>
            <option value="Investment">Investment</option>
            <option value="Business">Business</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Amount (₹)</label>
          <input type="number" id="incomeAmount" class="form-input" placeholder="Enter amount" required min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" id="incomeDescription" class="form-input" placeholder="Optional description">
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="incomeDate" class="form-input">
        </div>
        <button type="submit" class="btn btn-success btn-block">Add Income</button>
      </form>
    </div>
  </div>
  
  <!-- Add Expense Modal -->
  <div class="modal-overlay" id="expenseModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Add Expense</h3>
        <button class="modal-close">&times;</button>
      </div>
      <form id="expenseForm">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="expenseCategory" class="form-select" required>
            <option value="">Select category</option>
            <option value="Bills">Bills</option>
            <option value="Utilities">Utilities</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="EMI">EMI</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Education">Education</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Amount (₹)</label>
          <input type="number" id="expenseAmount" class="form-input" placeholder="Enter amount" required min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" id="expenseDescription" class="form-input" placeholder="Optional description">
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="expenseDate" class="form-input">
        </div>
        <button type="submit" class="btn btn-danger btn-block">Add Expense</button>
      </form>
    </div>
  </div>
  
  <script src="js/app.js"></script>
  <script>
    function displayTransactions(transactions) {
      const container = document.getElementById('transactionsList');
      
      if (!transactions || transactions.length === 0) {
        container.innerHTML = '<p style="color: white; text-align: center; padding: 20px;">No transaction found </p>';
        return;
      }

      let html = '';
      transactions.forEach(t => {
        const amount = Number(t.amount || t.value || t.price || 0);
        const desc = t.description || t.title || t.desc || t.note || 'No description';
        const category = t.category || t.cat || 'Other';
        const date = t.date || t.createdAt || t.created_at || new Date();
        const id = t._id || t.id;
        const type = (t.type || 'expense').toLowerCase();
        const isIncome = type === 'income';
        
        html += `
          <div style="background: #1e293b; padding: 16px; margin: 8px 0; border-radius: 8px; color: white; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1;">
              <h3 style="margin: 0 0 8px 0; color: ${isIncome ? '#10b981' : '#ef4444'}; font-size: 20px;">
                ${isIncome ? '+' : '-'} ₹${amount}
              </h3>
              <p style="margin: 4px 0; font-weight: bold; font-size: 16px;">${category}</p>
              <p style="margin: 4px 0; font-size: 14px; opacity: 0.8;">${desc}</p>
              <p style="margin: 4px 0; font-size: 12px; opacity: 0.6;">${new Date(date).toLocaleDateString('en-IN')}</p>
            </div>
            <button onclick="deleteTransaction('${id}', '${type}')" style="background: #dc2626; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-left: 16px;">Delete</button>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    async function loadTransactions() {
      if (!fingenius.requireAuth()) return;
      
      const container = document.getElementById('transactionsList');
      container.innerHTML = '<div class="loading-container"><div class="spinner"></div></div>';
      
      try {
        const typeFilter = document.getElementById('typeFilter').value;
        const categoryFilter = document.getElementById('categoryFilter').value;
        
        let url = 'http://localhost:5000/api/finance/transactions?';
        if (typeFilter) url += `type=${typeFilter}&`;
        if (categoryFilter) url += `category=${categoryFilter}&`;
        
        const response = await axios.get(url,{
          headers:{
            'Authorization':`Bearer ${localStorage.getItem('token')}`
          }
        });
        
        const transactions = response.data.transactions || response.data || [];
        displayTransactions(transactions);
        
      } catch (error) {
        console.error('Error loading transactions:', error);
        container.innerHTML = `<p style="color: red; padding: 20px;">Error: ${error.message}</p>`;
        fingenius.showAlert('Failed to load transactions');
      }
    }
    
    async function deleteTransaction(id, type) {
      if (!confirm('Are you sure you want to delete this transaction?')) return;
      
      try {
        const endpoint = type === 'income' ? '/finance/remove-income/' : '/finance/remove-expense/';
        await fingeniusAPI.delete(endpoint + id);
        fingenius.showAlert('Transaction deleted', 'success');
        loadTransactions();
      } catch (error) {
        fingenius.showAlert('Failed to delete transaction');
      }
    }
    
    // Event Listeners
    document.addEventListener('DOMContentLoaded', () => {
      loadTransactions();
      
      // Filters
      document.getElementById('typeFilter').addEventListener('change', loadTransactions);
      document.getElementById('categoryFilter').addEventListener('change', loadTransactions);
      
      // Modal buttons
      document.getElementById('addIncomeBtn').addEventListener('click', () => {
        document.getElementById('incomeModal').classList.add('active');
      });

      document.getElementById('addExpenseBtn').addEventListener('click', () => {
        document.getElementById('expenseModal').classList.add('active');
      });

      //Download CSV button
      document.getElementById('downloadBtn').addEventListener('click', () => {
        window.open('http://localhost:5000/api/finance/download-csv','_blank');
      });
      
      document.querySelectorAll('.modal-close').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
        });
      });
      
      // Forms
      document.getElementById('incomeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const category = document.getElementById('incomeCategory').value;
        const amount = document.getElementById('incomeAmount').value;
        const description = document.getElementById('incomeDescription').value;
        const date = document.getElementById('incomeDate').value;
        
        await fingeniusAPI.post('/finance/add-income', {
          category, amount: parseFloat(amount), description, date: date || new Date().toISOString()
        });
        
        document.getElementById('incomeModal').classList.remove('active');
        document.getElementById('incomeForm').reset();
        loadTransactions();
        fingenius.showAlert('Income added!', 'success');
      });
      
      document.getElementById('expenseForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const category = document.getElementById('expenseCategory').value;
        const amount = document.getElementById('expenseAmount').value;
        const description = document.getElementById('expenseDescription').value;
        const date = document.getElementById('expenseDate').value;
        
        await fingeniusAPI.post('/finance/add-expense', {
          category, amount: parseFloat(amount), description, date: date || new Date().toISOString()
        });
        
        document.getElementById('expenseModal').classList.remove('active');
        document.getElementById('expenseForm').reset();
        loadTransactions();
        fingenius.showAlert('Expense added!', 'success');
      });
      
      // Logout
      document.getElementById('logoutBtn').addEventListener('click', () => {
        fingenius.logout();
      });
    });
  </script>
</body>
