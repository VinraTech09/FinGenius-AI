<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinGenius AI - Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">FinGenius AI</div>
        <p class="auth-subtitle">Create your account</p>
      </div>
      
      <!-- Register Form -->
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" id="name" class="form-input" placeholder="Enter your name" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
        </div>     
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Create a password (min 6 characters)" required minlength="6">
        </div>
        
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
      
      <p class="text-center mt-2" style="color: var(--text-secondary);">
        Already have an account? <a href="index.html">Sign In</a>
      </p>
    </div>
  </div> 
  <script src="js/axios.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
